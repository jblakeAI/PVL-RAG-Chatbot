<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pampellone Villas By-Laws Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design tokens — villa palette ─────────────────────────── */
    :root {
      --bg:          #EDE5D0;
      --bg-dark:     #D9CEBC;
      --surface:     #FAF7F2;
      --border:      #C9BDAA;
      --accent:      #2C3340;      /* charcoal — roof & railings */
      --accent-warm: #B85C35;      /* terracotta — brick pavement */
      --accent-lt:   #F2EAD8;
      --terra-lt:    #F5E8DF;
      --text:        #1E1A16;
      --text-muted:  #7A6F5E;
      --user-bg:     #2C3340;
      --user-text:   #FAF7F2;
      --bot-bg:      #FAF7F2;
      --bot-border:  #C9BDAA;
      --radius:      12px;
      --font-serif:  'Playfair Display', Georgia, serif;
      --font-body:   'Crimson Pro', Georgia, serif;
      --font-mono:   'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 16px;
    }

    /* ── Hero image banner ─────────────────────────────────────── */
    #hero {
      width: 100%;
      max-width: 720px;
      position: relative;
      flex-shrink: 0;
      height: 160px;
      overflow: hidden;
    }

    #hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
      display: block;
    }

    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(44,51,64,0.15) 0%,
        rgba(44,51,64,0.55) 100%
      );
    }

    #hero-text {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px 18px;
      z-index: 1;
    }

    #hero-text h1 {
      font-family: var(--font-serif);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #FAF7F2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      line-height: 1.2;
    }

    #hero-text p {
      font-size: 16px;
      color: rgba(250,247,242,0.85);
      margin-top: 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    /* ── Chat window ───────────────────────────────────────────── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 12px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* ── Message bubbles ───────────────────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      gap: 4px;
      animation: fadein 0.22s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end;  align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 15.5px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
      font-family: var(--font-body);
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--bot-border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Clause citation pill */
    .clause-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: var(--accent-warm);
      background: var(--terra-lt);
      border-radius: 20px;
      padding: 3px 11px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid #E5C4B2;
    }
    .clause-tag:hover { background: #EDD5C5; }

    /* Expandable clause text */
    .clause-detail {
      display: none;
      background: var(--terra-lt);
      border: 1px solid #E5C4B2;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-top: 4px;
      max-width: 100%;
      white-space: pre-wrap;
      font-family: var(--font-mono);
    }
    .clause-detail.open { display: block; }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 13px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1;   }
    }

    /* ── Suggestions ───────────────────────────────────────────── */
    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 24px 10px;
      width: 100%;
      max-width: 720px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 18px;
      font-family: var(--font-body);
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .suggestion:hover {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: var(--terra-lt);
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-area {
      width: 100%;
      max-width: 720px;
      padding: 10px 24px 26px;
      flex-shrink: 0;
    }

    #input-wrap {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 9px 13px;
      transition: border-color 0.15s;
      box-shadow: 0 1px 4px rgba(44,51,64,0.06);
    }
    #input-wrap:focus-within { border-color: var(--accent); }

    #question {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 18px;
      background: transparent;
      color: var(--text);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #question::placeholder { color: var(--text-muted); }

    #send-btn {
      align-self: flex-end;
      background: var(--accent);
      color: #FAF7F2;
      border: none;
      border-radius: 9px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover  { background: var(--accent-warm); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { pointer-events: none; }

    /* Divider under hero */
    .hero-divider {
      width: 100%;
      max-width: 720px;
      height: 3px;
      background: linear-gradient(to right, var(--accent-warm), var(--accent), var(--accent-warm));
      flex-shrink: 0;
    }

    .error-bubble { border-color: #E5B4A8 !important; color: #7A2E1E; }
  </style>
</head>

<body>

  <!-- Hero banner with embedded image -->
  <div id="hero">
    <img id="hero-img" alt="Pampellone Villas" />
    <div id="hero-text">
      <h1>Pampellone Villas By-Laws Assistant</h1>
      <p>Ask any question about the by-laws.</p>
       <p>Answers are grounded in the official Pampellone Villas LTD By-law document.</p>
    </div>
  </div>

  <div class="hero-divider"></div>

  <div id="suggestions">
    <button class="suggestion" onclick="fillQuestion(this)">Who can call a special meeting?</button>
    <button class="suggestion" onclick="fillQuestion(this)">Who has the authority to sign cheques?</button>
    <button class="suggestion" onclick="fillQuestion(this)">How is a quorum defined?</button>
    <button class="suggestion" onclick="fillQuestion(this)">How are directors appointed?</button>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea
        id="question"
        rows="1"
        placeholder="Ask about the by-laws…"
        aria-label="Your question"
      ></textarea>
      <button id="send-btn" onclick="sendQuestion()" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 15L15 9L3 3V7.5L11 9L3 10.5V15Z" fill="white"/>
        </svg>
      </button>
    </div>
  </div>

    // ── Configuration ──────────────────────────────────────────────────────────
    const API_URL = "/ask";

    // ── Auto-resize textarea ───────────────────────────────────────────────────
    const textarea = document.getElementById("question");
    textarea.addEventListener("input", () => {
      textarea.style.height = "auto";
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
    });
    textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    // ── Suggestion chips ───────────────────────────────────────────────────────
    function fillQuestion(btn) {
      textarea.value = btn.textContent;
      textarea.focus();
      document.getElementById("suggestions").style.display = "none";
    }

    // ── Add a message bubble ───────────────────────────────────────────────────
    function addMessage(role, text, clauseId = null, clauseText = null) {
      const chat = document.getElementById("chat");
      const wrapper = document.createElement("div");
      wrapper.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrapper.appendChild(bubble);

      if (role === "bot" && clauseId) {
        const tag = document.createElement("button");
        tag.className = "clause-tag";
        tag.innerHTML = `📄 Clause ${clauseId} — click to expand`;
        tag.setAttribute("aria-expanded", "false");

        const detail = document.createElement("div");
        detail.className = "clause-detail";
        detail.textContent = clauseText || "";

        tag.addEventListener("click", () => {
          detail.classList.toggle("open");
          const expanded = detail.classList.contains("open");
          tag.setAttribute("aria-expanded", String(expanded));
          tag.innerHTML = expanded
            ? `📄 Clause ${clauseId} — click to collapse`
            : `📄 Clause ${clauseId} — click to expand`;
        });

        wrapper.appendChild(tag);
        wrapper.appendChild(detail);
      }

      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
      return wrapper;
    }

    // ── Typing indicator ───────────────────────────────────────────────────────
    function addTypingIndicator() {
      const chat = document.getElementById("chat");
      const el = document.createElement("div");
      el.className = "msg bot typing";
      el.id = "typing";
      el.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }
    function removeTypingIndicator() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    // ── Send function ──────────────────────────────────────────────────────────
    async function sendQuestion() {
      const input = document.getElementById("question");
      const btn   = document.getElementById("send-btn");
      const question = input.value.trim();
      if (!question) return;

      input.value = "";
      input.style.height = "auto";
      btn.disabled = true;
      document.getElementById("suggestions").style.display = "none";

      addMessage("user", question);
      addTypingIndicator();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        removeTypingIndicator();


         if (!response.ok) {
           let errorDetail = response.statusText;
           try {
             const err = await response.json();
             errorDetail = err.detail || JSON.stringify(err);
           } catch (e) {
             errorDetail = `HTTP ${response.status} - could not parse error response`;
           }
           addMessage("bot", `Error ${response.status}: ${errorDetail}`);
           document.querySelector("#chat .msg.bot:last-child .bubble").classList.add("error-bubble");
           return;
         }    

        const data = await response.json();
        addMessage("bot", data.answer, data.clause_id, data.clause_text);

      } catch (err) {
        removeTypingIndicator();
        addMessage("bot", "Could not connect to the server. Is the backend running?");
        document.querySelector("#chat .msg.bot:last-child .bubble").classList.add("error-bubble");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
